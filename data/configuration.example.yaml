# Indicates the configuration version (used by configuration migrations)
version: 5

# Home Assistant integration (MQTT discovery)
homeassistant:
    enabled: false

# Enable the frontend, runs on port 8080 by default
frontend:
    enabled: true
    # port: 8080

# MQTT settings
mqtt:
    # MQTT base topic for zigbee2mqtt MQTT messages
    base_topic: zigbee2mqtt
    # MQTT server URL
    server: "mqtt://localhost"
    # MQTT server authentication, uncomment if required:
    # user: my_user
    # password: my_password

# Serial settings, only required when Zigbee2MQTT fails to start with:
#   USB adapter discovery error (No valid USB adapter found).
#   Specify valid 'adapter' and 'port' in your configuration.
# serial:
#     # Location of the adapter
#     # USB adapters - use format "port: /dev/serial/by-id/XXX"
#     # Ethernet adapters - use format "port: tcp://192.168.1.12:6638"
#     port: /dev/serial/by-id/usb-Texas_Instruments_TI_CC2531_USB_CDC___0X00124B0018ED3DDF-if00
#     # Adapter type, allowed values: `zstack`, `ember`, `deconz`, `zigate` or `zboss`
#     adapter: zstack

# Periodically check whether devices are online/offline
# availability:
#     enabled: false

# Advanced settings
advanced:
    # channel: 11
    # Keeps verifiable device /set commands alive until the requested state is
    # observed from the device, a newer target supersedes it, or the bounded
    # attempts/deadline are exhausted. In a healthy network this sends only the
    # original command: the first real state report completes the desired state.
    # desired_state:
    #     enabled: true
    #     # Total sends including the first command.
    #     max_attempts: 3
    #     # Seconds to wait for a real state report before retrying.
    #     retry_cooldown: 8
    #     # Seconds after which an unresolved target is abandoned.
    #     deadline: 90
    #     # Orders same-burst sends by cached network-map topology and observed
    #     # apply latency when available. Unknown topology remains FIFO and this
    #     # never scans the network while handling a set command.
    #     topology_ordering: true
    # Let Zigbee2MQTT generate a network key on first start
    network_key: GENERATE
    # Let Zigbee2MQTT generate a pan_id on first start
    pan_id: GENERATE
    # Let Zigbee2MQTT generate a ext_pan_id on first start
    ext_pan_id: GENERATE
